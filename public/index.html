<!DOCTYPE html>
<html lang="es">
<head>

  <title>Gym Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <h2 class="sr-only">Gym routine tracker</h2>
  <div class="header">
    <div>
      <h1 id="header-title">Rutina de gimnasio</h1>
      <p id="today-label"></p>
    </div>
    <div class="lang-toggle-wrap">
      <button class="lang-opt" id="lang-es" onclick="setLang('es')">ES</button>
      <button class="lang-opt" id="lang-en" onclick="setLang('en')">EN</button>
    </div>
  </div>

  <div class="timer-bar">
    <div class="timer-top">
      <div class="timer-circle">
        <svg width="52" height="52" viewBox="0 0 52 52">
          <circle class="tc-track" cx="26" cy="26" r="22"/>
          <circle class="tc-fill" id="tc-arc" cx="26" cy="26" r="22" stroke-dasharray="138.2" stroke-dashoffset="138.2"/>
        </svg>
        <div class="tc-num" id="tc-num">—</div>
      </div>
      <div class="timer-mid">
        <div class="timer-status" id="tc-status"></div>
        <div class="timer-label" id="tc-label">—</div>
      </div>
      <div class="timer-right">
        <button class="stop-btn" id="tc-reset" onclick="resetTimer()" style="display:none">↺</button>
        <button class="play-btn" id="tc-play" onclick="togglePlay()">▶</button>
      </div>
    </div>
    <div class="timer-pills" id="tc-pills"></div>
  </div>

  <div class="day-tabs" id="day-tabs"></div>
  <div class="day-tab-sub" id="day-tab-sub" style="display:none"></div>
  <div id="workout-content"></div>
</div>

<div class="toast" id="toast"></div>

// ── State ─────────────────────────────────────────────────────────────────────

function loadST() {
  try {
    const raw = JSON.parse(localStorage.getItem(SK)) || {};
    if (raw._ts && Date.now() - raw._ts > TTL) {
      raw.session = { day: null, completed: {}, collapsed: {} };
    }
    raw.session = raw.session || { day: null, completed: {}, collapsed: {} };
    raw.session.day = null;
    return raw;
  } catch(e) { return {}; }
}
function saveST() {
  try { ST._ts = Date.now(); localStorage.setItem(SK, JSON.stringify(ST)); } catch(e) {}
}

let ST = loadST();
if (!ST.sessions) ST.sessions = [];
if (!ST.loads) ST.loads = {};
if (!ST.session) ST.session = { day: null, completed: {}, collapsed: {} };
if (!ST.session.collapsed) ST.session.collapsed = {};

let selDay = ST.session.day || null;
let T = { secs: 120, running: false, remaining: 120, interval: null, manual: false, pendingNext: null };

// ── Timer logic ───────────────────────────────────────────────────────────────

function getNextPendingEx() {
  if (!selDay) return null;
  const comp = ST.session.day === selDay ? (ST.session.completed || {}) : {};
  return getDays()[selDay].exercises.find(e => !comp[e.id]) || null;
}

function getTimerLabel() {
  if (!selDay) return '—';
  const next = getNextPendingEx();
  return next ? next.name : t().allDone;
}

function setTimerSecs(secs, manual) {
  if (T.running) { clearInterval(T.interval); T.interval = null; T.running = false; }
  T.secs = secs; T.remaining = secs; T.manual = !!manual; T.pendingNext = null;
  const arc = document.getElementById('tc-arc');
  if (arc) { arc.style.transition = 'stroke-dashoffset 0.3s ease'; arc.style.strokeDashoffset = '0'; }
  renderTimer();
}

function togglePlay() {
  if (T.running) {
    clearInterval(T.interval); T.interval = null; T.running = false;
  } else {
    T.running = true;
    T.interval = setInterval(tickT, 1000);
  }
  renderTimer();
}

function resetTimer() {
  clearInterval(T.interval); T.interval = null; T.running = false;
  T.remaining = T.secs;
  const arc = document.getElementById('tc-arc');
  if (arc) { arc.style.transition = 'stroke-dashoffset 0.3s ease'; arc.style.strokeDashoffset = '0'; }
  renderTimer();
}

function tickT() {
  T.remaining--;
  const arc = document.getElementById('tc-arc');
  const num = document.getElementById('tc-num');
  if (arc) {
    arc.style.transition = 'stroke-dashoffset 1s linear';
    arc.style.strokeDashoffset = CIRC * (1 - T.remaining / T.secs);
    arc.classList.toggle('urgent', T.remaining <= 10);
  }
  if (num) num.textContent = fmtSecs(T.remaining);
  if (T.remaining <= 0) {
    clearInterval(T.interval); T.interval = null; T.running = false;
    beep();
    if (T.pendingNext !== null && !T.manual) {
      const next = T.pendingNext; T.pendingNext = null;
      setTimerSecs(next, false);
      showToast(t().toastSeriesRest(fmtSecs(next)));
    } else {
      showToast(t().toastDone);
      renderTimer();
    }
  }
}

function beep() {
  try {
    const ac = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.18, 0.36].forEach(off => {
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.frequency.value = 880;
      g.gain.setValueAtTime(0.25, ac.currentTime + off);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + off + 0.13);
      o.start(ac.currentTime + off); o.stop(ac.currentTime + off + 0.14);
    });
  } catch(e) {}
  if (navigator.vibrate) navigator.vibrate([100,80,100,80,200]);
}

function fmtSecs(s) {
  const m = Math.floor(s/60), r = s%60;
  return m > 0 ? `${m}:${r.toString().padStart(2,'0')}` : `${s}s`;
}

// ── Render ────────────────────────────────────────────────────────────────────

function renderTimer() {
  const arc    = document.getElementById('tc-arc');
  const num    = document.getElementById('tc-num');
  const play   = document.getElementById('tc-play');
  const reset  = document.getElementById('tc-reset');
  const status = document.getElementById('tc-status');
  const label  = document.getElementById('tc-label');
  if (!num) return;

  if (arc && !T.running) {
    arc.style.strokeDashoffset = CIRC * (1 - T.remaining / T.secs);
    arc.classList.remove('urgent');
  }

  num.textContent = selDay ? fmtSecs(T.remaining) : '—';
  play.innerHTML = T.running
    ? '<svg width="12" height="14" viewBox="0 0 12 14"><rect x="0" y="0" width="4" height="14" rx="1" fill="currentColor"/><rect x="8" y="0" width="4" height="14" rx="1" fill="currentColor"/></svg>'
    : '▶';
  play.classList.toggle('running', T.running);
  reset.style.display = (!T.running && T.remaining < T.secs) ? 'flex' : 'none';
  status.textContent = selDay ? t().timerRest : t().timerIdle;
  label.textContent = getTimerLabel();
  renderPills();
}

function renderPills() {
  const c = document.getElementById('tc-pills');
  if (!c) return;
  let html = '';
  PILL_OPTS.forEach(p => {
    html += `<button class="pill${T.secs === p ? ' selected' : ''}" onclick="pickPill(${p})">${p}s</button>`;
  });
  html += `<span class="pill-sep"></span>`;
  html += `<div class="pill-custom"><input type="number" class="pill-input" value="${T.secs}" min="10" max="600" step="5" oninput="pickCustom(this.value)" onfocus="this.select()"><span class="pill-unit">${t().seg}</span></div>`;
  c.innerHTML = html;
}

function pickPill(secs) { setTimerSecs(secs, true); }
function pickCustom(val) { const n = parseInt(val); if (!isNaN(n) && n >= 10) setTimerSecs(n, true); }

function renderTabs() {
  const c = document.getElementById('day-tabs');
  const sub = document.getElementById('day-tab-sub');
  const days = getDays();
  c.innerHTML = '';
  DAY_KEYS.forEach(d => {
    const day = days[d];
    const btn = document.createElement('button');
    btn.className = 'day-tab' + (d===selDay?' active':'');
    btn.textContent = day.label;
    btn.onclick = () => onDaySelect(d);
    c.appendChild(btn);
  });
  if (selDay && sub) {
    const day = days[selDay];
    sub.style.display = 'block';
    sub.textContent = day.sub + (day.optional ? ` · ${t().optional}` : '');
  } else if (sub) {
    sub.style.display = 'none';
  }
}

function renderWarmupBlock(items, blockId, title, badge) {
  const collapsed = ST.session.collapsed || {};
  const isCollapsed = collapsed[blockId] === true;
  let h = '';
  h += `<div class="warmup-block">`;
  h += `<div class="warmup-header" onclick="toggleCollapse('${blockId}')">`;
  h += `<span class="warmup-title">${title}</span>`;
  h += `<div class="warmup-header-right">`;
  if (badge) h += `<span class="warmup-badge-inline">${badge}</span>`;
  h += `<span class="warmup-chevron">${isCollapsed ? '›' : '‹'}</span>`;
  h += `</div></div>`;
  if (!isCollapsed) {
    h += `<ul class="warmup-steps">`;
    items.forEach((w, i) => {
      const num = w.step !== undefined ? w.step : i + 1;
      h += `<li class="warmup-step"><span class="step-num">${num}.</span><span>${w.name} <span style="color:#888780;font-size:12px">· ${w.detail}</span></span></li>`;
    });
    h += `</ul>`;
  }
  h += `</div>`;
  return h;
}

function renderWorkout() {
  const c = document.getElementById('workout-content');
  const days = getDays();
  if (!selDay) {
    c.innerHTML = `<div class="empty-state"><p>${t().emptyTitle}</p><p>${t().emptyBody}</p></div>`;
    return;
  }
  const day = days[selDay];
  const comp = ST.session.day===selDay ? (ST.session.completed||{}) : {};
  const collapsed = ST.session.day===selDay ? (ST.session.collapsed||{}) : {};
  const total = day.exercises.length;
  const dayIds = new Set(day.exercises.map(e => e.id));
  const done = Object.entries(comp).filter(([id, v]) => v && dayIds.has(id)).length;
  const pct = total ? Math.min(100, Math.round(done/total*100)) : 0;

  let h = '';
  h += `<div class="prog-label">${t().progressLabel(done, total, pct)}</div>`;
  h += `<div class="prog-wrap"><div class="prog-fill" style="width:${pct}%"></div></div>`;

  // Warmup base block
  h += renderWarmupBlock(getWarmupBase(), '__warmup_base__', t().warmupBaseTitle, t().warmupBadge);

  // Warmup specific block
  const specificItems = getWarmupSpecific(day.warmupKey);
  if (specificItems.length) {
    h += renderWarmupBlock(specificItems, '__warmup_specific__', t().warmupSpecificTitle, null);
  }

  h += `<div class="sec-title">${day.label} — ${day.sub}</div>`;
  day.exercises.forEach(ex => {
    const isDone = comp[ex.id]===true;
    const isCollapsed = collapsed[ex.id]===true;
    const prev = (ST.loads[ex.id]||[]).slice(-1)[0];
    h += `<div class="ex-card${ex.hernia==='high'?' hernia-high':ex.hernia==='med'?' hernia-med':''}${isDone?' completed':''}">`;
    h += `<div class="ex-header" onclick="toggleCollapse('${ex.id}')">`;
    h += `<span class="ex-name">${ex.name}</span><div class="ex-badges">`;
    if (ex.hernia==='high') h += `<span class="badge-high">⭐⭐</span>`;
    else if (ex.hernia==='med') h += `<span class="badge-med">⭐</span>`;
    h += `<span class="rest-badge">${fmtSecs(ex.rest)}</span>`;
    h += `<button class="cbtn${isDone?' done':''}" onclick="event.stopPropagation();onExComplete('${ex.id}')">${isDone?'✓':''}</button>`;
    h += `</div></div>`;
    if (!isCollapsed) {
      h += `<div class="ex-body"><div class="ex-sets">${ex.sets}</div>`;
      if (ex.note) h += `<div class="ex-note">${ex.note}</div>`;
      h += `<div class="load-row"><input type="number" class="load-input" placeholder="${prev?prev.kg+'kg':'kg'}" step="2.5" min="0" oninput="saveLoad('${ex.id}',this.value)"><span class="load-unit">kg</span>`;
      if (prev) h += `<span class="load-prev">${t().lastLoad(prev.kg, prev.date)}</span>`;
      h += `</div></div>`;
    }
    h += `</div>`;
  });

  const allDone = done === total;
  h += `<button class="finish-btn" onclick="finishSession()" ${allDone?'':'disabled'}>${allDone ? t().finishReady : t().finishWaiting}</button>`;
  c.innerHTML = h;
}

// ── Actions ───────────────────────────────────────────────────────────────────

function onDaySelect(d) {
  selDay = d; ST.session.day = d; saveST();
  const comp = ST.session.completed || {};
  const first = getDays()[d].exercises.find(e => !comp[e.id]);
  if (first) { T.manual = false; T.pendingNext = null; setTimerSecs(first.rest, false); }
  render();
}

function onExComplete(exId) {
  if (ST.session.day !== selDay) ST.session = { day: selDay, completed: {}, collapsed: {} };
  if (!ST.session.collapsed) ST.session.collapsed = {};
  const cur = ST.session.completed[exId] || false;
  ST.session.completed[exId] = !cur;
  if (!cur) {
    ST.session.collapsed[exId] = true;
    const comp = ST.session.completed;
    const next = getDays()[selDay].exercises.find(e => !comp[e.id]);
    if (!T.manual) { T.pendingNext = next ? next.rest : null; setTimerSecs(INTER_EX, false); }
  } else {
    ST.session.collapsed[exId] = false;
    if (!T.manual) {
      const comp = ST.session.completed;
      const next = getDays()[selDay].exercises.find(e => !comp[e.id]);
      if (next) setTimerSecs(next.rest, false);
    }
  }
  saveST(); renderTimer(); renderWorkout();
}

function toggleCollapse(id) {
  if (!ST.session.collapsed) ST.session.collapsed = {};
  ST.session.collapsed[id] = !ST.session.collapsed[id];
  saveST(); renderWorkout();
}

function saveLoad(exId, val) {
  const kg = parseFloat(val);
  if (isNaN(kg) || kg <= 0) return;
  if (!ST.loads[exId]) ST.loads[exId] = [];
  const today = new Date().toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit'});
  const idx = ST.loads[exId].findIndex(l => l.date === today);
  if (idx >= 0) ST.loads[exId][idx].kg = kg; else ST.loads[exId].push({ kg, date: today });
  if (ST.loads[exId].length > 20) ST.loads[exId] = ST.loads[exId].slice(-20);
  saveST();
}

function finishSession() {
  const today = new Date().toDateString();
  ST.sessions = ST.sessions.filter(s => s.date!==today);
  ST.sessions.push({ day: selDay, date: today });
  if (ST.sessions.length > 30) ST.sessions = ST.sessions.slice(-30);
  ST.session = { day: null, completed: {}, collapsed: {} };
  selDay = null;
  clearInterval(T.interval); T.running = false; T.remaining = T.secs;
  saveST(); showToast(t().toastSession); render();
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

function render() {
  const locale = t().dateLocale;
  document.getElementById('header-title').textContent = t().appTitle;
  document.getElementById('lang-es').classList.toggle('active', lang === 'es');
  document.getElementById('lang-en').classList.toggle('active', lang === 'en');
  document.title = t().appTitle;
  document.getElementById('today-label').textContent = new Date()
    .toLocaleDateString(locale, {weekday:'long', day:'numeric', month:'long'})
    .replace(/^\w/, c => c.toUpperCase());
  renderTabs(); renderTimer(); renderWorkout();
}

if (selDay) {
  const comp = ST.session.completed || {};
  const first = getDays()[selDay] && getDays()[selDay].exercises.find(e => !comp[e.id]);
  if (first) { T.secs = first.rest; T.remaining = first.rest; }
}
render();
setTimeout(() => {
  if (selDay) {
    const arc = document.getElementById('tc-arc');
    if (arc) { arc.style.transition = 'stroke-dashoffset 0.3s ease'; arc.style.strokeDashoffset = '0'; }
  }
}, 50);
</script>
